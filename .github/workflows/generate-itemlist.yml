name: Generate itemlist.json

on:
  push:
    paths:
      - 'assets/sixsevencraft/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate itemlist.json
        run: |
          mkdir -p assets/sixsevencraft/textures/item
          find assets/sixsevencraft/textures/item -maxdepth 1 -name '*.png' \
            | sed 's/.*\///;s/.png$//' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))' \
            > assets/sixsevencraft/textures/item/itemlist.json
      
      - name: Debug list
        run: |
          echo "Listing item folder:"
          ls -R assets/sixsevencraft/textures/item
      
      - name: Commit itemlist.json
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add assets/sixsevencraft/textures/item/itemlist.json
          git commit -m "Auto-update itemlist.json" || echo "No changes"
          git push
