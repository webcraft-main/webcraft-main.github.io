<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>sixsevencraft</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="ui">
    <div id="instructions">
        WASD: Move | SPACE: Jump<br>
        SHIFT: Sprint | CTRL: Sneak<br>
        1-8: Select Hotbar | LMB/RMB: Use<br>
        P: Save | R: Reload
    </div>

    <div id="hud">
        <div id="hearts"></div>
        <div id="hunger"></div>
    </div>

    <div id="hotbar">
        <div class="slot active" id="s0">GRASS</div>
        <div class="slot" id="s1">STONE</div>
        <div class="slot" id="s2">WOOD</div>
        <div class="slot" id="s3">LEAVES</div>
        <div class="slot" id="s4">WATER</div>
        <div class="slot" id="s5">LAVA</div>
        <div class="slot" id="s6" style="color:yellow">SAND</div>
        <div class="slot" id="s7" style="color:red">TNT</div>
    </div>
</div>

<script type="module">
  import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158.0/+esm';
  window.THREE = THREE;
</script>
<script type="module">
  import SimplexNoise from 'https://cdn.jsdelivr.net/npm/simplex-noise@4.0.1/+esm';
  window.SimplexNoise = SimplexNoise;
</script>
<script type="module" src="main.js"></script>
</body>
</html>


<script type="module" src="main.js"></script>
</body>
</html>
