<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>SixSevenCraft</title>

    <!-- Favicon + PWA metadata -->
    <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
    <link rel="shortcut icon" href="favicon/favicon.ico" />
    <meta name="apple-mobile-web-app-title" content="SixSevenCraft" />
    <link rel="manifest" href="favicon/site.webmanifest" />

    <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- MAIN GAME CANVAS (WebGL) -->
<canvas id="mainCanvas"></canvas>

<!-- GUI CANVAS (HUD + Hotbar + Inventory) -->
<canvas id="guiCanvas"></canvas>

<!-- THREE.js -->
<script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158.0/+esm";
    window.THREE = THREE;
</script>

<!-- Simplex Noise -->
<script type="module">
    import { createNoise2D } from "https://cdn.jsdelivr.net/npm/simplex-noise@4.0.1/+esm";
    window.createNoise2D = createNoise2D;
</script>

<!-- GUI Renderer -->
<script type="module" src="gui.js"></script>

<!-- Main Game -->
<script type="module" src="main.js"></script>

</body>
</html>
